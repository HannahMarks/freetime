name: EAS Update

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Publish update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check EXPO_TOKEN
        if: env.EXPO_TOKEN == ''
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "EXPO_TOKEN is not set. Add it under Settings → Secrets and variables → Actions."
          echo "Generate one at https://expo.dev/settings/access-tokens."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        # --legacy-peer-deps required while Expo SDK 54 has a transitive
        # react-dom@19.2.6 vs react@19.1.0 peer mismatch. Revisit on next SDK bump.
        run: npm ci --legacy-peer-deps

      - name: Publish production update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas update --branch production --message "${{ github.event.head_commit.message }}" --non-interactive

      - name: Publish preview update
        if: github.event_name == 'pull_request'
        run: eas update --branch preview --message "PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}" --non-interactive
